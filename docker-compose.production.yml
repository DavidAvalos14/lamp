services:

  # ---Base de datos mySQL ---
  db:
    image: mysql:8.0
    container_name: lamp_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lamp_network

  # ---Apache + PHP---
  web:
    build: .
    env_file:
      - .env.prod
    container_name: lamp_web
    restart: always
    ports:
      - "80:80"
    volumes:
       - .:/var/www/html
    depends_on:
      - db
    networks:
      - lamp_network

networks:
  lamp_network:
    driver: bridge

volumes:
  db_data: